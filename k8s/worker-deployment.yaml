apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: instu-gram-worker:latest
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: MYSQL_HOST
          value: "mysql"
        - name: MYSQL_USER
          value: "instu"
        - name: MYSQL_PASSWORD
          value: "instupass"
        - name: MYSQL_DATABASE
          value: "instugram"
